<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Casos de Uso — Administrador — ReMed</title>
<style>
  body { margin: 0; background: #fff; font-family: Arial, sans-serif; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620">

  <!-- TITLE -->
  <text x="500" y="34" text-anchor="middle" font-size="20" font-weight="bold">Diagrama de Casos de Uso — Administrador</text>
  <line x1="140" y1="42" x2="860" y2="42" stroke="#999" stroke-width="1"/>

  <!-- SYSTEM BOUNDARY -->
  <rect x="140" y="56" width="720" height="530" fill="none" stroke="#000" stroke-width="2" rx="4"/>
  <text x="500" y="76" text-anchor="middle" font-size="15" font-weight="bold">Sistema ReMed</text>

  <!--
    Layout:
    Coluna esquerda cx=320: UC_A1, UC_A3, UC_A5
    Coluna direita  cx=680: UC_A2, UC_A4, UC_A6
    Ator Admin: x=500, cy=560 (abaixo do boundary, centralizado)
    Trilho esquerdo:  x=148 (fora da borda esq das elipses da col esq: 320-145=175 → usar 148)
    Trilho direito:   x=852 (fora da borda dir das elipses da col dir: 680+145=825 → usar 852)
  -->

  <!-- ═══ COLUNA ESQUERDA ═══ -->

  <!-- UC_A1: Visualizar painel de controle  cy=140 -->
  <ellipse cx="320" cy="140" rx="145" ry="24" fill="white" stroke="#000" stroke-width="1.5"/>
  <text x="320" y="136" text-anchor="middle" font-size="13">Visualizar painel</text>
  <text x="320" y="150" text-anchor="middle" font-size="13">de controle</text>

  <!-- UC_A3: Visualizar relatórios de adesão  cy=240 -->
  <ellipse cx="320" cy="240" rx="145" ry="24" fill="white" stroke="#000" stroke-width="1.5"/>
  <text x="320" y="236" text-anchor="middle" font-size="13">Visualizar relatórios</text>
  <text x="320" y="250" text-anchor="middle" font-size="13">de adesão</text>

  <!-- UC_A5: Configurar sistema e segurança  cy=340 -->
  <ellipse cx="320" cy="340" rx="145" ry="24" fill="white" stroke="#000" stroke-width="1.5"/>
  <text x="320" y="336" text-anchor="middle" font-size="13">Configurar sistema</text>
  <text x="320" y="350" text-anchor="middle" font-size="13">e segurança</text>

  <!-- ═══ COLUNA DIREITA ═══ -->

  <!-- UC_A2: Gerenciar usuários (prontuários)  cy=140 -->
  <ellipse cx="680" cy="140" rx="145" ry="24" fill="white" stroke="#000" stroke-width="1.5"/>
  <text x="680" y="136" text-anchor="middle" font-size="13">Gerenciar usuários</text>
  <text x="680" y="150" text-anchor="middle" font-size="13">(prontuários)</text>

  <!-- UC_A4: Gerenciar logística e inventário  cy=240 -->
  <ellipse cx="680" cy="240" rx="145" ry="24" fill="white" stroke="#000" stroke-width="1.5"/>
  <text x="680" y="236" text-anchor="middle" font-size="13">Gerenciar logística</text>
  <text x="680" y="250" text-anchor="middle" font-size="13">e inventário</text>

  <!-- UC_A6: Gerenciar diretório da equipe  cy=340 -->
  <ellipse cx="680" cy="340" rx="145" ry="24" fill="white" stroke="#000" stroke-width="1.5"/>
  <text x="680" y="336" text-anchor="middle" font-size="13">Gerenciar diretório</text>
  <text x="680" y="350" text-anchor="middle" font-size="13">da equipe</text>

  <!-- UC_A7: Exportar relatórios globais  cy=440 (centralizado) -->
  <ellipse cx="500" cy="440" rx="145" ry="24" fill="white" stroke="#000" stroke-width="1.5"/>
  <text x="500" y="436" text-anchor="middle" font-size="13">Exportar relatórios</text>
  <text x="500" y="450" text-anchor="middle" font-size="13">globais</text>

  <!-- ═══ ACTOR: ADMINISTRADOR (centralizado abaixo) ═══ -->
  <circle cx="500" cy="536" r="22" fill="white" stroke="#000" stroke-width="1.5"/>
  <line x1="500" y1="558" x2="500" y2="598" stroke="#000" stroke-width="1.5"/>
  <line x1="468" y1="576" x2="532" y2="576" stroke="#000" stroke-width="1.5"/>
  <line x1="500" y1="598" x2="478" y2="612" stroke="#000" stroke-width="1.5"/>
  <line x1="500" y1="598" x2="522" y2="612" stroke="#000" stroke-width="1.5"/>
  <text x="500" y="620" text-anchor="middle" font-size="13" font-weight="bold">Administrador</text>

  <!--
    Roteamento sem cruzar elipses:
    Do topo do ator (500, 514) saem dois trilhos horizontais:
      Trilho esquerdo em y=514 → x=148, depois sobe verticalmente
      Trilho direito  em y=514 → x=852, depois sobe verticalmente
    Cada UC recebe uma bifurcação do trilho em y diferente.

    Col esq borda esq = 320-145 = 175 → trilho em x=148
    Col dir borda dir = 680+145 = 825 → trilho em x=852
  -->

  <!-- === ADMIN → COLUNA ESQUERDA (trilho x=148) === -->
  <line x1="500" y1="514" x2="148" y2="514" stroke="#000" stroke-width="1"/>
  <!-- UC_A1 cy=140: trilho sobe até y=140 -->
  <line x1="148" y1="514" x2="148" y2="140" stroke="#000" stroke-width="1"/>
  <line x1="148" y1="140" x2="175" y2="140" stroke="#000" stroke-width="1"/>
  <!-- UC_A3 cy=240: bifurcação em x=163 -->
  <line x1="163" y1="514" x2="163" y2="240" stroke="#000" stroke-width="1"/>
  <line x1="163" y1="240" x2="175" y2="240" stroke="#000" stroke-width="1"/>
  <!-- UC_A5 cy=340: bifurcação em x=178 -->
  <line x1="178" y1="514" x2="178" y2="340" stroke="#000" stroke-width="1"/>
  <line x1="178" y1="340" x2="175" y2="340" stroke="#000" stroke-width="1"/>

  <!-- === ADMIN → COLUNA DIREITA (trilho x=852) === -->
  <line x1="500" y1="514" x2="852" y2="514" stroke="#000" stroke-width="1"/>
  <!-- UC_A2 cy=140 -->
  <line x1="852" y1="514" x2="852" y2="140" stroke="#000" stroke-width="1"/>
  <line x1="852" y1="140" x2="825" y2="140" stroke="#000" stroke-width="1"/>
  <!-- UC_A4 cy=240: bifurcação em x=837 -->
  <line x1="837" y1="514" x2="837" y2="240" stroke="#000" stroke-width="1"/>
  <line x1="837" y1="240" x2="825" y2="240" stroke="#000" stroke-width="1"/>
  <!-- UC_A6 cy=340: bifurcação em x=822 -->
  <line x1="822" y1="514" x2="822" y2="340" stroke="#000" stroke-width="1"/>
  <line x1="822" y1="340" x2="825" y2="340" stroke="#000" stroke-width="1"/>

  <!-- === ADMIN → UC_A7 Exportar relatórios (centro, linha direta para cima) === -->
  <line x1="500" y1="514" x2="500" y2="464" stroke="#000" stroke-width="1"/>

</svg>
</body>
</html>
